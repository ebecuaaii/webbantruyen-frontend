<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thêm/Sửa tài khoản - Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>

<body class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="../images/logo.png" alt="Logo" />
        <span>Kaleidoscope</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="admin-products.html" class="nav-item"><i class="fas fa-box"></i><span>Quản lý sản phẩm</span></a>
      <a href="admin-categories.html" class="nav-item"><i class="fas fa-list"></i><span>Quản lý danh mục</span></a>
      <a href="admin-orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i><span>Quản lý đơn hàng</span></a>
      <a href="admin-users.html" class="nav-item active"><i class="fas fa-users"></i><span>Quản lý tài khoản</span></a>
    </nav>
  </aside>

  <!-- Main Content -->
  <div class="admin-main">
    <header class="admin-header">
      <div class="header-left">
        <h1 id="pageTitle">Thêm tài khoản mới</h1>
      </div>
    </header>

    <main class="admin-content">
      <div class="form-container">
        <form class="admin-form" id="userForm">
          <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
              <label>Username *</label>
              <input type="text" name="username" class="form-control" required />
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" name="email" class="form-control" required />
            </div>
            <div class="form-group">
              <label>Mật khẩu (Để trống nếu không đổi)</label>
              <input type="password" name="password" class="form-control" />
            </div>
            <div class="form-group">
              <label>Họ tên</label>
              <input type="text" name="fullName" class="form-control" />
            </div>
            <div class="form-group">
              <label>Số điện thoại</label>
              <input type="text" name="phone" class="form-control" />
            </div>
            <div class="form-group">
              <label>Vai trò</label>
              <select name="role" class="form-control">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
              </select>
            </div>
            <div class="form-group">
              <label>Trạng thái</label>
              <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" name="enabled" checked style="width: 20px; height: 20px;" />
                <span>Hoạt động</span>
              </div>
            </div>
            <div class="form-group">
              <label>Avatar URL</label>
              <input type="text" name="avatar" class="form-control" />
            </div>
          </div>

          <div class="form-actions" style="margin-top: 30px; display: flex; gap: 10px;">
            <button type="submit" class="btn-create"
              style="background: #9f2425; color: #fff; padding: 10px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Lưu
              tài khoản</button>
            <button type="button" class="btn-cancel" onclick="window.location.href='admin-users.html'"
              style="background: #eee; color: #333; padding: 10px 30px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Hủy</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../js/admin.js"></script>
</body>

</html>
