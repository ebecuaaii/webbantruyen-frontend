<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Kaleidoscope</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>

  <body class="auth-page">
    <!-- Header with Logo -->
    <header class="auth-header">
      <div class="container auth-header-inner">
        <div class="logo-group">
          <img src="../images/logo.png" alt="Kaleidoscope" class="logo-img" />
          <span class="logo-text">Kaleidoscope</span>
        </div>
        <div style="flex: 1; text-align: right">
          <a href="register.html" class="auth-link">Tạo tài khoản</a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="auth-main">
      <div class="auth-container">
        <!-- Welcome Title -->
        <h1 class="auth-title">CHÀO MỪNG BẠN ĐẾN VỚI Kaleidoscope</h1>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm">
          <!-- Email or Phone -->
          <div class="form-group">
            <label class="form-label">Email hoặc Số điện thoại *</label>
            <input
              type="text"
              class="form-input"
              placeholder="Nhập email hoặc số điện thoại"
              name="usernameOrEmail"
              required
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">Mật khẩu *</label>
            <input
              type="password"
              class="form-input"
              placeholder="Nhập mật khẩu"
              name="password"
              required
            />
          </div>

          <!-- Submit Button -->
          <button type="submit" class="auth-button">ĐĂNG NHẬP</button>
        </form>
      </div>
    </main>

    <!-- Configuration -->
    <script src="../js/config.js"></script>
    <!-- Custom JS -->
    <script src="../js/main.js"></script>
  </body>
</html>
