<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaleidoscope - Đơn hàng của tôi</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/profile.css" />
    <style>
      .order-card {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: box-shadow 0.2s;
      }

      .order-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .order-card-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .order-card-body {
        display: flex;
        justify-content: space-between;
        color: #666;
        font-size: 14px;
        margin-bottom: 6px;
      }

      .order-items-preview {
        font-size: 13px;
        color: #999;
      }

      .order-status {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-pending {
        background: #fff3e0;
        color: #f57c00;
      }

      .status-processing {
        background: #e3f2fd;
        color: #1976d2;
      }

      .status-shipped {
        background: #e8f5e9;
        color: #388e3c;
      }

      .status-delivered {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .status-cancelled {
        background: #ffebee;
        color: #c62828;
      }

      .empty-msg {
        text-align: center;
        color: #999;
        padding: 40px 0;
      }

      .order-items-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }

      .order-items-table th,
      .order-items-table td {
        padding: 10px;
        border-bottom: 1px solid #eee;
        text-align: left;
      }

      .order-detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .order-detail-info p {
        margin: 6px 0;
        font-size: 14px;
      }

      .btn-back {
        background: none;
        border: 1px solid #ccc;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-bottom: 16px;
      }
    </style>
  </head>

  <body>
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="container top-bar-inner">
        <div class="top-bar-left">
          <div class="social-icons">
            <a href="#" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
          </div>
          <span class="about-link">Về Kaleidoscope</span>
        </div>
        <div class="top-bar-right">
          <i class="fa-solid fa-phone"></i>
          <span>Contact: (+84) 97 182 50 26</span>
        </div>
      </div>
    </div>

    <header class="main-header">
      <div class="container header-inner">
        <div class="logo">
          <a
            href="../index.html"
            style="display: flex; flex-direction: column; align-items: center"
          >
            <img src="../images/logo.png" alt="Logo" />
            <span class="logo-text">Kaleidoscope</span>
          </a>
        </div>
        <div class="header-actions">
          <a href="profile.html" class="action-item"
            ><i class="fa-regular fa-user"></i><span>Tài khoản</span></a
          >
        </div>
      </div>
    </header>

    <nav class="main-nav">
      <div class="container">
        <ul class="nav-list">
          <li><a href="products.html" class="nav-btn">TẤT CẢ SẢN PHẨM</a></li>
          <li><a href="news.html" class="nav-btn">TIN TỨC</a></li>
          <li><a href="about.html" class="nav-btn">GIỚI THIỆU</a></li>
        </ul>
      </div>
    </nav>

    <main>
      <div class="container">
        <div class="breadcrumb">
          <a href="../index.html">Trang chủ</a>
          <i class="fa-solid fa-angles-right"></i>
          <a href="profile.html">Tài khoản</a>
          <i class="fa-solid fa-angles-right"></i>
          <span style="font-weight: 700; color: #000">Đơn hàng của tôi</span>
        </div>

        <div class="profile-container">
          <aside class="profile-sidebar">
            <nav class="profile-nav">
              <a href="profile.html" class="profile-nav-item"
                >Thông tin tài khoản</a
              >
              <a href="my-orders.html" class="profile-nav-item active"
                >Đơn hàng của tôi</a
              >
              <a href="#" class="profile-nav-item">Đổi mật khẩu</a>
              <a href="auth.html" class="profile-nav-item logout-link"
                >Đăng xuất</a
              >
            </nav>
          </aside>

          <div class="profile-main">
            <!-- Danh sách đơn hàng -->
            <div id="ordersListView">
              <h1 class="profile-main-title">Đơn hàng của tôi</h1>
              <div id="myOrdersList">
                <p class="empty-msg">Đang tải...</p>
              </div>
            </div>

            <!-- Chi tiết đơn hàng -->
            <div id="orderDetailView" style="display: none">
              <button class="btn-back" onclick="showOrdersList()">
                <i class="fa-solid fa-arrow-left"></i> Quay lại
              </button>
              <div id="orderDetail"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="main-footer">
      <div class="footer-bottom">
        COPYRIGHTS &copy; 2026 by <strong>Kaleidoscope</strong>
      </div>
    </footer>

    <!-- Configuration -->
    <script src="../js/config.js"></script>
    <!-- Custom JS -->
    <script src="../js/main.js"></script>
    <script src="../js/my-orders.js"></script>
    <script>
      function showOrdersList() {
        document.getElementById("ordersListView").style.display = "block";
        document.getElementById("orderDetailView").style.display = "none";
        history.pushState({}, "", "my-orders.html");
      }

      // Override viewOrderDetail để hiển thị inline thay vì redirect
      function viewOrderDetail(orderId) {
        document.getElementById("ordersListView").style.display = "none";
        document.getElementById("orderDetailView").style.display = "block";
        loadOrderDetail(orderId);
      }
    </script>
  </body>
</html>
